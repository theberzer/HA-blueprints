blueprint:
  name: ZHA - Namron 4512793 / 4512794 Multi-Channel Wall Switch
  description: >
    Blueprint for the Namron 4512793 / 4512794 Zigbee wall switch used with ZHA
    and a custom quirk that emits zha_event commands.

    Supported modes:
    - 1-channel
    - 2-channel
    - 3-channel

    Supported actions per button:
    - ON short press
    - OFF short press
    - ON long hold
    - ON long release
    - OFF long hold
    - OFF long release

    Expected event names from the custom quirk:
    - button_1_on_short_press
    - button_1_off_short_press
    - button_1_on_long_hold
    - button_1_on_long_release
    - button_1_off_long_hold
    - button_1_off_long_release
    - button_2_on_short_press
    - button_2_off_short_press
    - button_2_on_long_hold
    - button_2_on_long_release
    - button_2_off_long_hold
    - button_2_off_long_release
    - button_3_on_short_press
    - button_3_off_short_press
    - button_3_on_long_hold
    - button_3_on_long_release
    - button_3_off_long_hold
    - button_3_off_long_release

  domain: automation
  input:
    remote_device:
      name: Namron wall switch
      description: Select the Namron wall switch device from ZHA
      selector:
        device:
          integration: zha

    button_1_on_short_press:
      name: Button 1 ON - short press
      default: []
      selector:
        action: {}

    button_1_off_short_press:
      name: Button 1 OFF - short press
      default: []
      selector:
        action: {}

    button_1_on_long_hold:
      name: Button 1 ON - long hold
      default: []
      selector:
        action: {}

    button_1_on_long_release:
      name: Button 1 ON - long release
      default: []
      selector:
        action: {}

    button_1_off_long_hold:
      name: Button 1 OFF - long hold
      default: []
      selector:
        action: {}

    button_1_off_long_release:
      name: Button 1 OFF - long release
      default: []
      selector:
        action: {}

    button_2_on_short_press:
      name: Button 2 ON - short press
      default: []
      selector:
        action: {}

    button_2_off_short_press:
      name: Button 2 OFF - short press
      default: []
      selector:
        action: {}

    button_2_on_long_hold:
      name: Button 2 ON - long hold
      default: []
      selector:
        action: {}

    button_2_on_long_release:
      name: Button 2 ON - long release
      default: []
      selector:
        action: {}

    button_2_off_long_hold:
      name: Button 2 OFF - long hold
      default: []
      selector:
        action: {}

    button_2_off_long_release:
      name: Button 2 OFF - long release
      default: []
      selector:
        action: {}

    button_3_on_short_press:
      name: Button 3 ON - short press
      default: []
      selector:
        action: {}

    button_3_off_short_press:
      name: Button 3 OFF - short press
      default: []
      selector:
        action: {}

    button_3_on_long_hold:
      name: Button 3 ON - long hold
      default: []
      selector:
        action: {}

    button_3_on_long_release:
      name: Button 3 ON - long release
      default: []
      selector:
        action: {}

    button_3_off_long_hold:
      name: Button 3 OFF - long hold
      default: []
      selector:
        action: {}

    button_3_off_long_release:
      name: Button 3 OFF - long release
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: zha_event

variables:
  remote_device: !input remote_device
  trigger_device_id: "{{ trigger.event.data.device_id | default('') }}"
  command: "{{ trigger.event.data.command | default('') }}"

condition:
  - condition: template
    value_template: "{{ trigger_device_id == remote_device }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_on_short_press' }}"
        sequence: !input button_1_on_short_press

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_off_short_press' }}"
        sequence: !input button_1_off_short_press

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_on_long_hold' }}"
        sequence: !input button_1_on_long_hold

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_on_long_release' }}"
        sequence: !input button_1_on_long_release

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_off_long_hold' }}"
        sequence: !input button_1_off_long_hold

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_off_long_release' }}"
        sequence: !input button_1_off_long_release

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_on_short_press' }}"
        sequence: !input button_2_on_short_press

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_off_short_press' }}"
        sequence: !input button_2_off_short_press

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_on_long_hold' }}"
        sequence: !input button_2_on_long_hold

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_on_long_release' }}"
        sequence: !input button_2_on_long_release

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_off_long_hold' }}"
        sequence: !input button_2_off_long_hold

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_off_long_release' }}"
        sequence: !input button_2_off_long_release

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_on_short_press' }}"
        sequence: !input button_3_on_short_press

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_off_short_press' }}"
        sequence: !input button_3_off_short_press

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_on_long_hold' }}"
        sequence: !input button_3_on_long_hold

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_on_long_release' }}"
        sequence: !input button_3_on_long_release

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_off_long_hold' }}"
        sequence: !input button_3_off_long_hold

      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_off_long_release' }}"
        sequence: !input button_3_off_long_release